<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    .container{
    display: grid;
    gap: 2em;
    grid-template-columns: 100px 100px;
    grid-template-rows: 100px 100px 100px 100px;
    grid-template-areas: 
   'box-1 box-2'
   'box-3 box-2'
   'box-3 box-4'
   'box-5 box-4'
    
    
    ;
    
}

    .item{
    color: red;
    background: blue;
    
    }
    </style>



</head>
<body>
    <div class="container">
    <div class="item" style="grid-area: box-1;">1</div>
    <div class="item" style="grid-area: box-2;">2</div>
    <div class="item" style="grid-area: box-3;">3</div>
    <div class="item" style="grid-area: box-4;">4</div>
    <div class="item" style="grid-area: box-5;">5</div>
    
</div>
</body>
</html>
