<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>

    
  
    .container{
    display: grid;
    gap: 2em;
    grid-template-columns: repeat(auto-fit, minmax(200px 1fr));
     
     
    

    }

    .box{
    background-color: red;
    width: 200px;

    }

    .wrapper{
    display: grid;
    width: 500px;
    place-items: center;
    border: 2px solid blue;
    }

    
    </style>
</head>
<body>
    <div class="container">
    <div class="box">Lorem ipsum dolor sit amet.</div>
    <div class="box">Lorem ipsum dolor sit amet.</div>
    <div class="box">Lorem ipsum dolor sit amet.</div>
    <div class="box">Lorem ipsum dolor sit amet.</div>
    <div class="box">Lorem ipsum dolor sit amet.</div>
    <div class="box">Lorem ipsum dolor sit amet.</div>


    </div>

    <div class="wrapper">
    <div class="wrap">Lorem ipsum dolor sit amet.</div>
    <div class="wrap">Lorem ipsum dolor sit amet.</div>
    <div class="wrap">Lorem ipsum dolor sit amet.</div>
    <div class="wrap">Lorem ipsum dolor sit amet</div>

    </div>
</body>
</html>
