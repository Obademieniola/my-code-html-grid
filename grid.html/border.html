<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
        display: flex;
        justify-content: center;
        text-align: center;
        background-color: rgb(32, 10, 10);
        margin-top: 25px;
        }
        .container{
        border-style: groove;
        width: 300px;
        padding-left: 20px;
        padding-right: 20px;
        padding-top: 10px;
        padding-bottom: 50px;
        background-color: black;
        border: none;
        border-radius: 12px;
        }

        .jak{
        border-radius: 100%;
        height: 150px;
        margin-top: 20px;
        }

        .lond{
        color: green;
        margin-bottom: 0px;
        margin-top: 0px;
        }

       

     .git{
     margin-top: 10px;
     width: 290px;
     padding: 10px;
     background-color: rgb(2, 2, 20);
     color: white;
     border: none;
     border-radius: 10px;
     transition: background-color 0.3s ease;
     
     }

     .git:hover{
     background-color: green;
     }
    </style>

</head>
<body>
    <div class="container">
        <img class="jak" src="/image/jake.avif" alt="" width="150px">
        <h2 class="lond"> <span style="color: white;">Jessica Randall</span></h2>
        <p class="lond">London, united kingdom</p>
        <p style="color: white;">''front-end developer and avoid reader''</p>

        <button class="git"><strong>Github</strong></button><br>
        <button class="git"><strong>Frontend Mentor</strong></button><br>
        <button class="git"><strong>Linkedin</strong></button><br>
        <button class="git"><strong>Twitter</strong></button><br>
        <button class="git"><strong>Instagram</strong></button><br>




    </div>
</body>
</html>
